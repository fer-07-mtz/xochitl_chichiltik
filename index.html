<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas 🌻</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython_stdlib.js"></script>
    <style>
        body { 
            margin: 0; 
            background-color: black; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            color: white;
            font-family: Arial, sans-serif;
        }
        #turtle-canvas { border: none; }
        #loading { position: absolute; top: 20px; font-size: 1.2em; }
    </style>
</head>
<body onload="brython()">
    <div id="loading">Cargando tus flores... (esto puede tardar unos segundos)</div>
    <div id="turtle-canvas"></div>

    <script type="text/python">
import turtle
import json
from browser import document, window, ajax, timer

def draw_the_flowers(regions):
    # Quitamos el mensaje de carga
    document['loading'].style.display = 'none'
    
    canvas = document['turtle-canvas']
    turtle.set_defaults(canvas=canvas)
    
    screen = turtle.Screen()
    screen.setup(800, 800)
    
    t = turtle.Turtle()
    t.hideturtle()
    t.speed(0)
    
    # Optimizamos el cálculo de límites para no saturar la memoria
    all_points = [(p[0], p[1]) for r in regions for p in r['contour']]
    xs = [p[0] for p in all_points]
    ys = [p[1] for p in all_points]
    
    min_x, max_x = min(xs), max(xs)
    min_y, max_y = min(ys), max(ys)
    
    width = max_x - min_x
    height = max_y - min_y
    scale = min(650 / width, 650 / height)
    center_x = (min_x + max_x) / 2
    center_y = (min_y + max_y) / 2

    # Función para dibujar por partes (evita que la página se bloquee)
    def draw_step(index):
        if index >= len(regions):
            return
            
        region = regions[index]
        color = '#{:02x}{:02x}{:02x}'.format(
            int(region['color'][0]),
            int(region['color'][1]),
            int(region['color'][2])
        )
        t.color(color, color)
        
        points = region['contour']
        t.begin_fill()
        t.penup()

        x0 = (points[0][0] - center_x) * scale
        y0 = (center_y - points[0][1]) * scale
        t.goto(x0, y0)
        t.pendown()

        for point in points[1:]:
            x = (point[0] - center_x) * scale
            y = (center_y - point[1]) * scale
            t.goto(x, y)

        t.goto(x0, y0)
        t.end_fill()
        
        # Dibujamos la siguiente región después de un breve descanso
        timer.set_timeout(lambda: draw_step(index + 1), 1)

    draw_step(0)

def on_complete(req):
    if req.status == 200 or req.status == 0:
        try:
            data = json.loads(req.text)
            draw_the_flowers(data)
        except Exception as e:
            document['loading'].text = f"Error al procesar datos: {e}"
    else:
        document['loading'].text = "No se pudo cargar el archivo sunflowers.json"

# Cargamos el JSON
req = ajax.ajax()
req.bind('complete', on_complete)
req.open('GET', 'sunflowers.json', True)
req.send()
    </script>
</body>
</html>

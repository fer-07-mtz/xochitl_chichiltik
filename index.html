<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas 🌻</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython_stdlib.js"></script>
    <style>
        body { margin: 0; background-color: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        #turtle-canvas { background-color: black; border: 2px solid #555; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #status { margin-bottom: 15px; font-size: 18px; color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body onload="brython()">
    <div id="status">Cargando girasol...</div>
    <div id="turtle-canvas"></div>

    <script type="text/python">
import turtle
import json
from browser import document, window, ajax, timer

def start_drawing(regions):
    status = document['status']
    status.text = "Dibujando para ti... 🌻"
    
    canvas = document['turtle-canvas']
    # Tamaño responsivo
    win_size = min(window.innerWidth, window.innerHeight) * 0.85
    canvas.width = canvas.height = int(win_size)
    
    turtle.set_defaults(canvas=canvas)
    t = turtle.Turtle()
    t.hideturtle()
    t.speed(0)
    
    # 1. Extraer todos los puntos para calcular el encuadre
    points = []
    for r in regions:
        points.extend(r['contour'])
    
    xs = [p[0] for p in points]
    ys = [p[1] for p in points]
    
    min_x, max_x = min(xs), max(xs)
    min_y, max_y = min(ys), max(ys)
    
    # 2. Calcular centro y escala para que quepa perfecto
    data_w = max_x - min_x
    data_h = max_y - min_y
    
    # Usamos el 90% del espacio disponible
    scale = (canvas.width * 0.9) / max(data_w, data_h)
    
    center_x = (min_x + max_x) / 2
    center_y = (min_y + max_y) / 2

    def draw_step(i):
        if i >= len(regions):
            status.text = "¡Para ti! 🌻✨"
            return
            
        r = regions[i]
        c = r['color']
        color_hex = '#%02x%02x%02x' % (int(c[0]), int(c[1]), int(c[2]))
        
        t.penup()
        t.color(color_hex)
        t.fillcolor(color_hex)
        
        pts = r['contour']
        # Transformar coordenadas: centrar y escalar
        # Invertimos Y (coordenada de Turtle vs Imagen)
        start_x = (pts[0][0] - center_x) * scale
        start_y = (center_y - pts[0][1]) * scale
        
        t.goto(start_x, start_y)
        t.pendown()
        t.begin_fill()
        for p in pts[1:]:
            t.goto((p[0] - center_x) * scale, (center_y - p[1]) * scale)
        t.end_fill()
        
        # Dibujamos rápido pero sin trabar
        timer.set_timeout(lambda: draw_step(i + 1), 1)

    draw_step(0)

def on_load(req):
    if req.status == 200 or req.status == 0:
        data = json.loads(req.text)
        start_drawing(data)
    else:
        document['status'].text = "Error: No se encontró el archivo .json"

# IMPORTANTE: Asegúrate de que este nombre sea exacto al de tu archivo ligero
ajax.get("sunflowers_web.json", oncomplete=on_load)
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas 🌻</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython_stdlib.js"></script>
    <style>
        body { margin: 0; background-color: black; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        #turtle-canvas { background-color: #050505; border: 1px solid #333; }
        #status { position: absolute; top: 10px; font-size: 14px; color: #ffeb3b; text-align: center; width: 100%; }
    </style>
</head>
<body onload="brython()">
    <div id="status">Preparando lienzo...</div>
    <div id="turtle-canvas"></div>

<script type="text/python">
import turtle
import json
from browser import document, window, ajax, timer

def start_drawing(regions):
    canvas = document['turtle-canvas']
    # Ajustar el canvas al tamaño de la ventana
    w, h = window.innerWidth, window.innerHeight
    size = min(w, h, 600)
    canvas.width = canvas.height = size
    
    turtle.set_defaults(canvas=canvas)
    t = turtle.Turtle()
    t.hideturtle()
    t.speed(0)
    
    # --- CÁLCULO DE ESCALA Y CENTRADO AUTOMÁTICO ---
    all_pts = [p for r in regions for p in r['contour']]
    xs = [p[0] for p in all_pts]
    ys = [p[1] for p in all_pts]
    
    min_x, max_x = min(xs), max(xs)
    min_y, max_y = min(ys), max(ys)
    
    data_w = max_x - min_x
    data_h = max_y - min_y
    # Escalar al 80% del canvas
    scale = (size * 0.8) / max(data_w, data_h)
    
    offset_x = (min_x + max_x) / 2
    offset_y = (min_y + max_y) / 2

    def draw_step(i):
        if i >= len(regions):
            document['status'].text = "¡Para ti! 🌻✨"
            return
            
        r = regions[i]
        color = '#%02x%02x%02x' % (int(r['color'][0]), int(r['color'][1]), int(r['color'][2]))
        
        t.penup()
        t.color(color)
        t.fillcolor(color)
        
        pts = r['contour']
        # Mover al primer punto escalado
        t.goto((pts[0][0] - offset_x) * scale, (offset_y - pts[0][1]) * scale)
        t.pendown()
        t.begin_fill()
        for p in pts[1:]:
            t.goto((p[0] - offset_x) * scale, (offset_y - p[1]) * scale)
        t.end_fill()
        
        timer.set_timeout(lambda: draw_step(i + 1), 1)

    draw_step(0)

def on_load(req):
    if req.status == 200 or req.status == 0:
        data = json.loads(req.text)
        start_drawing(data)
    else:
        document['status'].text = "Error al cargar el dibujo"

# USAR EL ARCHIVO LIGERO QUE CREASTE
ajax.get("sunflowers_web.json", oncomplete=on_load)
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas 🌻</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython_stdlib.js"></script>
    <style>
        body { margin: 0; background-color: black; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        #turtle-canvas { background-color: #050505; border: 1px solid #333; }
        #status { position: absolute; top: 10px; font-size: 14px; color: #ffeb3b; text-align: center; width: 100%; }
    </style>
</head>
<body onload="brython()">
    <div id="status">Preparando lienzo...</div>
    <div id="turtle-canvas"></div>

<script type="text/python">
import turtle
import json
from browser import document, ajax, timer, window

def start_drawing(regions):
    status = document['status']
    status.text = "Pintando flores... 🌻"
    
    canvas = document['turtle-canvas']
    # Forzamos un tamaño cuadrado estándar para evitar que se pierda
    size = 500
    canvas.width, canvas.height = size, size
    
    # Reiniciamos Turtle por completo
    turtle.set_defaults(canvas=canvas)
    t = turtle.Turtle()
    t.hideturtle()
    t.speed(0)
    
    # --- ENCONTRAR EL DIBUJO ---
    points = []
    for r in regions:
        points.extend(r.get('contour', []))
    
    if not points:
        status.text = "Error: El archivo no tiene puntos"
        return

    xs = [p[0] for p in points]
    ys = [p[1] for p in points]
    
    min_x, max_x = min(xs), max(xs)
    min_y, max_y = min(ys), max(ys)
    
    # Centro y Escala
    mid_x, mid_y = (min_x + max_x) / 2, (min_y + max_y) / 2
    diff = max(max_x - min_x, max_y - min_y, 1)
    scale = 450 / diff # Queremos que quepa en los 500px del canvas

    def draw_step(i):
        if i >= len(regions):
            status.text = "¡Para ti! 🌻✨"
            return
            
        r = regions[i]
        c = r['color']
        # Forzamos el color para que sea válido
        color_hex = '#%02x%02x%02x' % (int(c[0]), int(c[1]), int(c[2]))
        
        pts = r.get('contour', [])
        if len(pts) < 2:
            timer.set_timeout(lambda: draw_step(i + 1), 1)
            return

        t.penup()
        t.color(color_hex)
        t.fillcolor(color_hex)
        
        # Transformación manual de coordenadas
        # (x - centro) * escala
        # (y - centro) * escala (invertido para Turtle)
        start_x = (pts[0][0] - mid_x) * scale
        start_y = (mid_y - pts[0][1]) * scale
        
        t.goto(start_x, start_y)
        t.pendown()
        t.begin_fill()
        for p in pts[1:]:
            t.goto((p[0] - mid_x) * scale, (mid_y - p[1]) * scale)
        t.end_fill()
        
        timer.set_timeout(lambda: draw_step(i + 1), 1)

    draw_step(0)

def on_load(req):
    if req.status == 200 or req.status == 0:
        try:
            data = json.loads(req.text)
            start_drawing(data)
        except:
            document['status'].text = "Error de lectura"
    else:
        document['status'].text = "No se encontró el archivo ligero"

ajax.get("sunflowers_web.json", oncomplete=on_load)
    </script>
</body>
</html>

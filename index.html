<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas 🌻</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython_stdlib.js"></script>
    <style>
        body { margin: 0; background-color: black; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        #turtle-canvas { background-color: #050505; border: 1px solid #333; }
        #status { position: absolute; top: 10px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body onload="brython()">
    <div id="status">Iniciando...</div>
    <div id="turtle-canvas"></div>

    <script type="text/python">
import turtle
import json
from browser import document, ajax, timer

def start_drawing(regions):
    status = document['status']
    status.text = "Dibujando pétalos..."
    
    canvas = document['turtle-canvas']
    canvas.width = 600
    canvas.height = 600
    
    turtle.set_defaults(canvas=canvas)
    t = turtle.Turtle()
    t.hideturtle()
    t.speed(0)
    
    # 1. Obtener todos los puntos para centrar
    points_list = []
    for r in regions:
        for p in r['contour']:
            points_list.append((p[0], p[1]))
    
    if not points_list:
        status.text = "Error: El archivo JSON está vacío"
        return

    min_x = min(p[0] for p in points_list)
    max_x = max(p[0] for p in points_list)
    min_y = min(p[1] for p in points_list)
    max_y = max(p[1] for p in points_list)
    
    # 2. Calcular escala (un poco más pequeña para asegurar que quepa)
    w = max_x - min_x
    h = max_y - min_y
    scale = min(500/w, 500/h) if w > 0 and h > 0 else 1
    
    mid_x = (min_x + max_x) / 2
    mid_y = (min_y + max_y) / 2

    def draw_part(i):
        if i >= len(regions):
            status.text = "¡Listo! 🌻"
            return
            
        reg = regions[i]
        c = reg['color']
        hex_color = '#%02x%02x%02x' % (int(c[0]), int(c[1]), int(c[2]))
        
        t.penup()
        t.color(hex_color)
        t.fillcolor(hex_color)
        
        pts = reg['contour']
        # Mover al primer punto
        start_x = (pts[0][0] - mid_x) * scale
        start_y = (mid_y - pts[0][1]) * scale
        t.goto(start_x, start_y)
        
        t.pendown()
        t.begin_fill()
        for p in pts[1:]:
            curr_x = (p[0] - mid_x) * scale
            curr_y = (mid_y - p[1]) * scale
            t.goto(curr_x, curr_y)
        t.end_fill()
        
        # Dibujar siguiente bloque en 1ms
        timer.set_timeout(lambda: draw_part(i + 1), 1)

    draw_part(0)

def load_json(req):
    status = document['status']
    if req.status == 200 or req.status == 0:
        try:
            data = json.loads(req.text)
            start_drawing(data)
        except Exception as e:
            status.text = f"Error en JSON: {e}"
    else:
        status.text = "No se encontró sunflowers.json"

req = ajax.ajax()
req.bind('complete', load_json)
req.open('GET', 'sunflowers.json', True)
req.send()
    </script>
</body>
</html>

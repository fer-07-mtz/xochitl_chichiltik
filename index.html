<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas 🌻</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython_stdlib.js"></script>
    <style>
        body { margin: 0; background-color: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        #turtle-canvas { background-color: #000; border: 2px solid #ffeb3b; border-radius: 15px; }
        #status { margin-bottom: 15px; font-size: 24px; color: #ffeb3b; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body onload="brython()">
    <div id="status">Cargando girasol...</div>
    <div id="turtle-canvas"></div>

    <script type="text/python">
import turtle
import json
from browser import document, window, ajax, timer

def start_drawing(regions):
    status = document['status']
    status.text = "Dibujando para ti... 🌻"
    
    canvas = document['turtle-canvas']
    win_size = min(window.innerWidth, window.innerHeight) * 0.8
    canvas.width = canvas.height = int(win_size)
    
    turtle.set_defaults(canvas=canvas)
    t = turtle.Turtle()
    t.hideturtle()
    t.speed(0)
    
    # 1. Filtrar regiones: Quitar lo que sea muy oscuro (el fondo)
    # y solo quedarnos con lo que tenga color
    valid_regions = []
    for r in regions:
        c = r['color']
        # Si el color es casi negro (menos de 40 en total), lo ignoramos
        if sum(c) > 40:
            valid_regions.append(r)
    
    if not valid_regions:
        status.text = "Error: No se detectaron colores"
        return

    # 2. Calcular encuadre con las regiones válidas
    all_pts = []
    for r in valid_regions: all_pts.extend(r['contour'])
    
    xs = [p[0] for p in all_pts]
    ys = [p[1] for p in all_pts]
    min_x, max_x = min(xs), max(xs)
    min_y, max_y = min(ys), max(ys)
    
    dib_w, dib_h = max_x - min_x, max_y - min_y
    scale = (canvas.width * 0.95) / max(dib_w, dib_h, 1)
    cx, cy = (min_x + max_x) / 2, (min_y + max_y) / 2

    def draw_step(i):
        if i >= len(valid_regions):
            status.text = "¡Para ti! 🌻✨"
            return
            
        r = valid_regions[i]
        c = r['color']
        
        # Asegurar que el color esté en rango 0-255
        rgb = []
        for val in c:
            if max(c) <= 1.1: rgb.append(int(val * 255))
            else: rgb.append(int(val))
        
        color_hex = '#%02x%02x%02x' % (rgb[0], rgb[1], rgb[2])
        
        t.penup()
        t.color(color_hex)
        t.fillcolor(color_hex)
        
        pts = r['contour']
        t.goto((pts[0][0] - cx) * scale, (cy - pts[0][1]) * scale)
        t.pendown()
        t.begin_fill()
        for p in pts[1:]:
            t.goto((p[0] - cx) * scale, (cy - p[1]) * scale)
        t.end_fill()
        
        # Dibujamos un poco más rápido para que no tarde tanto
        timer.set_timeout(lambda: draw_step(i + 1), 1)

    draw_step(0)

def on_load(req):
    if req.status == 200 or req.status == 0:
        start_drawing(json.loads(req.text))

ajax.get("sunflowers_web.json", oncomplete=on_load)
    </script>
</body>
</html>

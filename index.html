<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas 🌻</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython_stdlib.js"></script>
    <style>
        body { margin: 0; background-color: black; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        #turtle-canvas { background-color: #000; }
        #status { position: absolute; top: 10px; font-size: 14px; color: #ffeb3b; text-align: center; width: 100%; }
    </style>
</head>
<body onload="brython()">
    <div id="status">Preparando lienzo...</div>
    <div id="turtle-canvas"></div>

    <script type="text/python">
import turtle
import json
from browser import document, ajax, timer, window

def start_drawing(regions):
    status = document['status']
    status.text = "Dibujando flores amarillas... 🌻"
    
    canvas = document['turtle-canvas']
    # Ajustamos al tamaño de la ventana para que no se salga en el cel
    w_width = window.innerWidth
    w_height = window.innerHeight
    size = min(w_width, w_height, 600)
    canvas.width, canvas.height = size, size
    
    turtle.set_defaults(canvas=canvas)
    t = turtle.Turtle()
    t.hideturtle()
    t.speed(0)
    
    # 1. Escaneo rápido para encontrar el centro y escala
    all_points = []
    for r in regions:
        if 'contour' in r:
            all_points.extend(r['contour'])
    
    if not all_points:
        status.text = "Error: Datos vacíos"
        return

    xs = [p[0] for p in all_points]
    ys = [p[1] for p in all_points]
    min_x, max_x = min(xs), max(xs)
    min_y, max_y = min(ys), max(ys)
    
    data_w = max_x - min_x
    data_h = max_y - min_y
    scale = (size * 0.8) / max(data_w, data_h)
    
    off_x = (min_x + max_x) / 2
    off_y = (min_y + max_y) / 2

    def draw_step(i):
        if i >= len(regions):
            status.text = "¡Para ti! 🌻✨"
            return
            
        r = regions[i]
        c = r['color']
        # Convertir color a hex
        color_hex = '#%02x%02x%02x' % (int(c[0]), int(c[1]), int(c[2]))
        
        t.penup()
        t.fillcolor(color_hex)
        t.color(color_hex)
        
        pts = r['contour']
        # Mover al inicio del pétalo
        t.goto((pts[0][0] - off_x) * scale, (off_y - pts[0][1]) * scale)
        t.pendown()
        t.begin_fill()
        for p in pts[1:]:
            t.goto((p[0] - off_x) * scale, (off_y - p[1]) * scale)
        t.end_fill()
        
        # El secreto: pausar un poquito más para archivos gigantes
        timer.set_timeout(lambda: draw_step(i + 1), 1)

    draw_step(0)

def on_load(req):
    if req.status == 200 or req.status == 0:
        try:
            # Forzamos la limpieza de texto antes de cargar
            clean_text = req.text.strip()
            data = json.loads(clean_text)
            start_drawing(data)
        except Exception as e:
            document['status'].text = f"Error de memoria: El archivo es muy grande para este dispositivo."
    else:
        document['status'].text = "Error 404: No encontré sunflowers.json"

document['status'].text = "Descargando datos pesados... espera un momento"
ajax.get("sunflowers_web.json", oncomplete=on_load)
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas🌻 (Corrección Matemática)</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython_stdlib.js"></script>
    <style>
        body { margin: 0; background-color: black; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        #turtle-canvas { background-color: #050505; border: 1px solid #333; }
        #status { position: absolute; top: 10px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body onload="brython()">
    <div id="status">Iniciando...</div>
    <div id="turtle-canvas"></div>

    <script type="text/python">
import turtle
import json
from browser import document, ajax, timer

def start_drawing(regions):
    status = document['status']
    status.text = "Dibujando... (este dibujo es pesado, por favor espera)"
    
    canvas = document['turtle-canvas']
    canvas_w, canvas_h = 600, 600
    canvas.width, canvas.height = canvas_w, canvas_h
    turtle.set_defaults(canvas=canvas)
    
    screen = turtle.Screen()
    screen.setup(canvas_w, canvas_h)
    t = turtle.Turtle()
    t.hideturtle()
    t.speed(0)
    
    # --- AJUSTE MATEMÁTICO DE SUPERVIVENCIA (REVISION TOTAL) ---
    points_list = []
    for r in regions:
        if 'contour' in r and len(r['contour']) > 1:
            points_list.extend([(p[0], p[1]) for p in r['contour']])
    
    if not points_list:
        status.text = "Error: El JSON no tiene puntos válidos"
        return

    xs, ys = zip(*points_list)
    min_x, max_x, min_y, max_y = min(xs), max(xs), min(ys), max(ys)
    
    w, h = max_x - min_x, max_y - min_y
    if w == 0 or h == 0:
        status.text = "Error: Dibujo con dimensiones cero"
        return

    # Dejamos un 5% de margen
    margin_percent = 0.95
    scale = min( (canvas_w / w) * margin_percent, (canvas_h / h) * margin_percent )
    
    # Este es el centro *matemático* del dibujo, no el de la pantalla
    center_x = (min_x + max_x) / 2
    center_y = (min_y + max_y) / 2

    # El dibujo se hará con un delay mayor para no saturar al navegador con tanta matemática
    def draw_part(i):
        if i >= len(regions):
            status.text = "¡Listo! 🌻"
            return
            
        reg = regions[i]
        c = reg['color']
        hex_color = '#%02x%02x%02x' % (int(c[0]), int(c[1]), int(c[2]))
        
        t.penup()
        t.color(hex_color)
        t.fillcolor(hex_color)
        
        pts = reg['contour']
        if not pts:
            timer.set_timeout(lambda: draw_part(i + 1), 1)
            return

        # Función de transformación a coordenadas de pantalla (AJUSTADA)
        def to_screen_pts(pts):
            return [ ( (p[0] - center_x) * scale , (p[1] - center_y) * scale * -1 ) for p in pts ]

        scr_pts = to_screen_pts(pts)
        
        # Mover al primer punto (ya escalado y centrado)
        t.goto(scr_pts[0][0], scr_pts[0][1])
        t.pendown()
        t.begin_fill()
        for p_scr in scr_pts[1:]:
            t.goto(p_scr[0], p_scr[1])
        t.end_fill()
        
        # Incrementamos un poco el tiempo para ver si el delay era el problema
        timer.set_timeout(lambda: draw_part(i + 1), 5)

    draw_part(0)

# --- (Lo demás se queda igual) ---
def load_json(req):
    status = document['status']
    if req.status == 200 or req.status == 0:
        try:
            data = json.loads(req.text)
            start_drawing(data)
        except Exception as e:
            status.text = f"Error en JSON: {e}"
    else:
        status.text = "No se encontró sunflowers.json"

req = ajax.ajax()
req.bind('complete', load_json)
req.open('GET', 'sunflowers.json', True)
req.send()
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas 🌻</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython_stdlib.js"></script>
    <style>
        body { margin: 0; background-color: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        #turtle-canvas { background-color: black; border: 2px solid #555; }
        #status { margin-bottom: 15px; font-size: 18px; color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body onload="brython()">
    <div id="status">Cargando girasol...</div>
    <div id="turtle-canvas"></div>

    <script type="text/python">
import turtle
import json
from browser import document, window, ajax, timer

def start_drawing(regions):
    status = document['status']
    status.text = "Dibujando para ti... 🌻"
    
    canvas = document['turtle-canvas']
    win_size = min(window.innerWidth, window.innerHeight) * 0.8
    canvas.width = canvas.height = int(win_size)
    
    turtle.set_defaults(canvas=canvas)
    t = turtle.Turtle()
    t.hideturtle()
    t.speed(0)
    
    # --- ESCANEO DE SUPERVIVENCIA ---
    all_pts = []
    for r in regions:
        all_pts.extend(r['contour'])
    
    # Extraer todas las X y todas las Y
    xs = [p[0] for p in all_pts]
    ys = [p[1] for p in all_pts]
    
    # Encontrar los extremos reales del dibujo
    min_x, max_x = min(xs), max(xs)
    min_y, max_y = min(ys), max(ys)
    
    # Calcular el tamaño real del dibujo
    dibujo_ancho = max_x - min_x
    dibujo_alto = max_y - min_y
    
    # Ajustar escala para que ocupe el 90% del cuadro negro
    # Usamos un valor pequeño por si acaso para que NO sea gigante
    escala = (canvas.width * 0.9) / max(dibujo_ancho, dibujo_alto, 1)
    
    # CENTRO REAL DEL DIBUJO
    centro_x = (min_x + max_x) / 2
    centro_y = (min_y + max_y) / 2

    def draw_step(i):
        if i >= len(regions):
            status.text = "¡Para ti! 🌻✨"
            return
            
        r = regions[i]
        pts = r['contour']
        
        # Color del archivo
        c = r['color']
        color_hex = '#%02x%02x%02x' % (int(c[0]), int(c[1]), int(c[2]))
            
        t.penup()
        t.color(color_hex)
        t.fillcolor(color_hex)
        
        # EL SECRETO: Restar el centro y multiplicar por escala
        # Ponemos el primer punto
        x0 = (pts[0][0] - centro_x) * escala
        y0 = (centro_y - pts[0][1]) * escala
        t.goto(x0, y0)
        
        t.pendown()
        t.begin_fill()
        for p in pts[1:]:
            xi = (p[0] - centro_x) * escala
            yi = (centro_y - p[1]) * escala
            t.goto(xi, yi)
        t.end_fill()
        
        timer.set_timeout(lambda: draw_step(i + 1), 1)

    draw_step(0)

def on_load(req):
    if req.status == 200 or req.status == 0:
        data = json.loads(req.text)
        # --- ESTO NOS DIRÁ LA VERDAD ---
        print(f"DEBUG: Cantidad de regiones: {len(data)}")
        if len(data) > 0:
            puesto_uno = data[0]['contour'][0]
            color_uno = data[0]['color']
            print(f"DEBUG: Primer punto: {puesto_uno}")
            print(f"DEBUG: Primer color: {color_uno}")
        # -------------------------------
        start_drawing(data)
    else:
        document['status'].text = "No se encontró sunflowers_web.json"

# Asegúrate que este nombre es el del archivo de 125KB
ajax.get("sunflowers_web.json", oncomplete=on_load)
    </script>
</body>
</html>

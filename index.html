<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas 🌻</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.4/brython_stdlib.js"></script>
    <style>
        body { margin: 0; background-color: black; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        #turtle-canvas { background-color: #050505; border: 1px solid #333; }
        #status { position: absolute; top: 10px; font-size: 14px; color: #ffeb3b; text-align: center; width: 100%; }
    </style>
</head>
<body onload="brython()">
    <div id="status">Preparando lienzo...</div>
    <div id="turtle-canvas"></div>

    <script type="text/python">
import turtle
import json
from browser import document, ajax, timer, window

def start_drawing(regions):
    status = document['status']
    status.text = "Buscando tus flores... 🌻"
    
    canvas = document['turtle-canvas']
    # Ajustamos el tamaño del lienzo para que se adapte a la pantalla
    size = min(window.innerWidth, window.innerHeight, 600)
    canvas.width, canvas.height = size, size
    
    turtle.set_defaults(canvas=canvas)
    t = turtle.Turtle()
    t.hideturtle()
    t.speed(0)
    
    # --- LÓGICA DE CENTRADO Y ESCALA AUTOMÁTICA ---
    points_list = []
    for r in regions:
        if 'contour' in r and len(r['contour']) > 1:
            points_list.extend([(p[0], p[1]) for p in r['contour']])
    
    if not points_list:
        status.text = "Error: Datos vacíos o no válidos"
        return

    xs, ys = zip(*points_list)
    min_x, max_x, min_y, max_y = min(xs), max(xs), min(ys), max(ys)
    
    # Calculamos el centro real de lo que sea que haya en el JSON
    mid_x, mid_y = (min_x + max_x) / 2, (min_y + max_y) / 2
    
    # Ajustamos la escala para que ocupe el 90% del cuadro
    range_x, range_y = (max_x - min_x) or 1, (max_y - min_y) or 1
    scale = (size * 0.9) / max(range_x, range_y)

    def draw_part(i):
        if i >= len(regions):
            status.text = "¡Para ti! 🌻✨"
            return
            
        reg = regions[i]
        c = reg['color']
        # Convertir color a hex para evitar errores en la web
        hex_color = '#%02x%02x%02x' % (int(c[0]), int(c[1]), int(c[2]))
        
        t.penup()
        t.color(hex_color)
        t.fillcolor(hex_color)
        
        pts = reg.get('contour', [])
        if len(pts) < 2:
            timer.set_timeout(lambda: draw_part(i + 1), 1)
            return

        # Mover al inicio con la nueva escala centrada
        t.goto((pts[0][0] - mid_x) * scale, (mid_y - pts[0][1]) * scale)
        t.pendown()
        t.begin_fill()
        for p in pts[1:]:
            t.goto((p[0] - mid_x) * scale, (mid_y - p[1]) * scale)
        t.end_fill()
        
        timer.set_timeout(lambda: draw_part(i + 1), 1)

    draw_part(0)

def on_load(req):
    if req.status == 200 or req.status == 0:
        try:
            # Forzamos la limpieza de texto antes de cargar
            clean_text = req.text.strip()
            data = json.loads(clean_text)
            start_drawing(data)
        except Exception as e:
            document['status'].text = f"Error al leer el dibujo ligero: {e}"
    else:
        document['status'].text = "Error 404: No encontré sunflowers_web.json"

document['status'].text = "Descargando datos... espera un momento"
# Usamos ajax.get directamente para simplificar
ajax.get("sunflowers_web.json", oncomplete=on_load)
    </script>
</body>
</html>
